<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteador</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lobster&family=Roboto:wght@400;700&display=swap">
    <link rel="stylesheet" href="ENDERECO_DO_CSS">
</head>
<body>
    <main>
        <h1>Sorteador de Números</h1>
        <form id="Sorteador">
            <div>
                <label for="min">Valor Mínimo:</label>
                <input type="number" id="min" name="min" required min="1" value="1" readonly>
            </div>
            <div>
                <label for="max">Valor Máximo:</label>
                <input type="number" id="max" name="max" required min="1" value="100" readonly>
            </div>
            <button type="submit">Sortear</button>
        </form>
        <div class="resultado">
        O número sorteado foi: <span id="resultado"></span>
        </div>
    </main>
    <script src="ENDERECO_DO_JS"></script>
</body>
</html>
